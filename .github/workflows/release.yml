name: release

# OIDC trusted publisher workflow. Triggered on `v*.*.*` tag pushes.
# Pre-conditions configured outside this file:
#  - PyPI pending publisher registered for project `rlwatch`, owner
#    `varun1724`, repo `rlwatch`, workflow `release.yml`, environment `pypi`.
#  - GitHub Environment `pypi` exists in repo settings with required reviewer
#    = self and Deployment branches/tags = `Tag: v*.*.*`.
# Both layers must match exactly or PyPI rejects the OIDC token at publish.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so the version embedding can see the tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Show what we built
        run: ls -la dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  test-before-publish:
    name: full non-trl test suite + 90% coverage gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install rlwatch with [dev]
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit + property + simulation + integration tiers with coverage
        run: |
          pytest \
            tests/unit tests/property tests/simulations tests/integration \
            -m "not trl and not perf and not tutorial" \
            --cov=rlwatch \
            --cov-fail-under=90

  publish:
    name: publish to PyPI (manual approval required)
    runs-on: ubuntu-latest
    needs: [build, test-before-publish]
    # The `pypi` GitHub environment requires a manual approval. Setting
    # the environment here is what enables OIDC trusted publishing.
    environment:
      name: pypi
      url: https://pypi.org/p/rlwatch
    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: write   # required to attach sdist+wheel to the GitHub release
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Pull the section between the current version's heading and the
          # next ## heading. The tag name strips the leading 'v'.
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          echo "wrote release-notes.md ($(wc -l < release-notes.md) lines)"
          cat release-notes.md

      - name: Publish to PyPI via OIDC trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` field — OIDC handles auth via id-token: write.

      - name: Create GitHub release with changelog body
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
          generate_release_notes: false
          fail_on_unmatched_files: true
